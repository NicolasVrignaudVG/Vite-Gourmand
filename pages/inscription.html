<!-- Structure complète pour l'affichage dans le routeur -->
<div class="connexion-page">
    <!-- Fond image -->
    <div class="connexion-bg">
        <img src="images/pexels-olaseni-omoare-2148436008-30322395.jpg"
             alt="Restaurant Vite&amp;Gourmand">
    </div>

    <!-- Carte d'inscription -->
    <div class="login-card">
        <div class="card-header">
            <img src="images/LOGO.png" alt="Logo Vite&amp;Gourmand">
            <h1>Créer mon compte</h1>
            <p>Inscrivez-vous pour profiter de nos offres</p>
        </div>

        <div class="form-msg" id="formMsg" role="alert"></div>

        <form class="login-form" id="registerForm" novalidate>
            <div class="input-group">
                <label for="NomInput">Nom</label>
                <div class="input-wrapper">
                    <input type="text" id="NomInput" placeholder="Votre nom"
                           name="Nom" autocomplete="family-name">
                </div>
            </div>

            <div class="input-group">
                <label for="PrenomInput">Prénom</label>
                <div class="input-wrapper">
                    <input type="text" id="PrenomInput" placeholder="Votre prénom"
                           name="Prenom" autocomplete="given-name">
                </div>
            </div>

            <div class="input-group">
                <label for="email">Adresse e-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email"
                           placeholder="exemple@email.com" required
                           autocomplete="email">
                    <span class="input-icon" aria-hidden="true">📧</span>
                </div>
            </div>

            <div class="input-group">
                <label for="telephone">Téléphone</label>
                <div class="input-wrapper">
                    <input type="tel" id="telephone" name="telephone"
                           placeholder="06 12 34 56 78" required
                           autocomplete="tel">
                    <span class="input-icon" aria-hidden="true">📱</span>
                </div>
            </div>

            <div class="input-group">
                <label for="adresse">Adresse postale</label>
                <div class="input-wrapper">
                    <input type="text" id="adresse" name="adresse"
                           placeholder="12 rue de la Paix, 33000 Bordeaux" required
                           autocomplete="street-address">
                    <span class="input-icon" aria-hidden="true">📍</span>
                </div>
            </div>

            <div class="input-group">
                <label for="pseudonyme">
                    Pseudonyme public
                    <span class="field-optional">(optionnel — affiché sur vos avis)</span>
                </label>
                <div class="input-wrapper">
                    <input type="text" id="pseudonyme" name="pseudonyme"
                           placeholder="Ex : Jean B., Gourmand33…"
                           maxlength="50" autocomplete="nickname">
                    <span class="input-icon" aria-hidden="true">✍️</span>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required minlength="8"
                           autocomplete="new-password">
                    <button type="button"
                            class="input-icon toggle password-toggle"
                            aria-label="Afficher / masquer le mot de passe">👁️</button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmez votre mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="••••••••" required minlength="8"
                           autocomplete="new-password">
                    <button type="button"
                            class="input-icon toggle password-toggle2"
                            aria-label="Afficher / masquer le mot de passe">👁️</button>
                </div>
            </div>

            <button type="submit" class="login-btn">S'inscrire</button>

            <div class="security-badge">
                <span aria-hidden="true">🔒</span> Inscription sécurisée SSL
            </div>

            <div class="divider">ou</div>

            <div class="signup-link">
                Vous avez déjà un compte ?
                <a href="#connexion">Se connecter</a>
            </div>
        </form>
    </div>
</div>
