<!-- Structure complète pour l'affichage dans le routeur -->
<div class="connexion-page">
    <!-- Fond image -->
    <div class="connexion-bg">
        <img src="images/pexels-olaseni-omoare-2148436008-30322395.jpg"
             alt="Restaurant Vite&amp;Gourmand">
    </div>

    <!-- Carte de contact -->
    <div class="login-card">
        <div class="card-header">
            <img src="images/LOGO.png" alt="Logo Vite&amp;Gourmand">
            <h1>Nous contacter</h1>
            <p>Nous vous répondons sous 48h</p>
        </div>

        <div class="form-msg" id="formMsg" role="alert"></div>

        <form id="contactForm" class="login-form" novalidate>
            <div class="input-group">
                <label for="title">Titre de la demande</label>
                <div class="input-wrapper">
                    <input type="text"
                           id="title"
                           name="title"
                           placeholder="Ex : Information produits, réservation, etc."
                           autocomplete="off">
                    <span class="input-icon">📌</span>
                </div>
            </div>

            <div class="input-group">
                <label for="description">Description</label>
                <div class="input-wrapper">
                    <textarea id="description"
                              name="description"
                              rows="4"
                              placeholder="Décrivez votre demande..."></textarea>
                </div>
            </div>

            <div class="input-group">
                <label for="email">Adresse e-mail</label>
                <div class="input-wrapper">
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="exemple@email.com"
                           autocomplete="email">
                    <span class="input-icon">📧</span>
                </div>
            </div>

            <button type="submit" class="login-btn">
                📩 Envoyer la demande
            </button>

            <div class="security-badge">
                <span aria-hidden="true">🔒</span>
                Vos informations restent confidentielles
            </div>


        </form>
    </div>
</div>
