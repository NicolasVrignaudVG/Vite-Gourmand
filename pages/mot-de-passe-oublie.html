<div class="connexion-page">
    <div class="connexion-bg">
        <img src="images/pexels-olaseni-omoare-2148436008-30322395.jpg" alt="Restaurant Vite&amp;Gourmand">
    </div>

    <div class="login-card">
        <div class="card-header">
            <img src="images/LOGO.png" alt="Logo Vite&amp;Gourmand">
            <h1>Mot de passe oublié</h1>
            <p>Saisissez votre e-mail pour recevoir un lien de réinitialisation</p>
        </div>

        <div class="form-msg" id="formMsg" role="alert"></div>

        <form class="login-form" id="forgotForm" novalidate>
            <div class="input-group">
                <label for="email">Adresse e-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="exemple@email.com" required autocomplete="email">
                    <span class="input-icon" aria-hidden="true">📧</span>
                </div>
            </div>

            <button type="submit" class="login-btn">Envoyer le lien</button>

            <div class="security-badge">
                <span aria-hidden="true">🔒</span> Lien valable 1 heure
            </div>

            <div class="signup-link">
                <a href="#connexion">← Retour à la connexion</a>
            </div>
        </form>
    </div>
</div>
