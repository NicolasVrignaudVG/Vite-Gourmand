<div class="espace-container">

    <div class="espace-header">
        <div>
            <h1>Mon espace</h1>
            <p class="espace-subtitle">Bienvenue, <strong id="user-nom">Utilisateur</strong></p>
        </div>
        <button class="btn-logout" id="btn-logout">Se déconnecter</button>
    </div>

    <div class="espace-layout">

        <nav class="espace-nav">
            <button class="espace-nav-btn active" data-panel="commandes">📦 Mes commandes</button>
            <button class="espace-nav-btn" data-panel="profil">👤 Mon profil</button>
        </nav>

        <div class="espace-content">

            <!-- PANEL : MES COMMANDES -->
            <div class="espace-panel" id="panel-commandes">
                <div class="panel-title-bar"><h2>Mes commandes</h2></div>
                <div class="commandes-list" id="user-commandes-list">
                    <p style="text-align:center;padding:2rem;color:var(--color-text-muted)">Chargement…</p>
                </div>
            </div>

            <!-- PANEL : MON PROFIL -->
            <div class="espace-panel hidden" id="panel-profil">
                <div class="panel-title-bar"><h2>Mon profil</h2></div>
                <div class="commande-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="profil-nom">Nom</label>
                            <div class="input-wrapper"><input type="text" id="profil-nom" autocomplete="family-name"></div>
                        </div>
                        <div class="input-group">
                            <label for="profil-prenom">Prénom</label>
                            <div class="input-wrapper"><input type="text" id="profil-prenom" autocomplete="given-name"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="profil-email">E-mail</label>
                            <div class="input-wrapper">
                                <input type="email" id="profil-email" autocomplete="email">
                                <span class="input-icon" aria-hidden="true">📧</span>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="profil-gsm">GSM</label>
                            <div class="input-wrapper">
                                <input type="tel" id="profil-gsm" autocomplete="tel">
                                <span class="input-icon" aria-hidden="true">📱</span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="profil-adresse">Adresse postale</label>
                        <div class="input-wrapper">
                            <input type="text" id="profil-adresse" autocomplete="street-address">
                            <span class="input-icon" aria-hidden="true">📍</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="profil-mdp">Nouveau mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="profil-mdp" placeholder="Laisser vide pour ne pas changer" autocomplete="new-password">
                            <button type="button" class="input-icon toggle password-toggle" aria-label="Afficher / masquer le mot de passe">👁️</button>
                        </div>
                    </div>
                    <div class="form-msg" id="profil-msg" role="alert"></div>
                    <div class="step-actions"><button class="btn-step-next" id="btn-save-profil">💾 Enregistrer</button></div>
                </div>
            </div>

        </div>
    </div>


<!-- Modal modification commande -->
<div class="modal" id="modal-modifier-commande">
    <div class="modal-content" style="max-width:500px;width:90%">
        <span class="close-modal" id="close-modifier-commande">&times;</span>
        <h3>Modifier la commande</h3>
        <input type="hidden" id="modif-commande-id">
        <div class="form-row" style="margin-top:1rem">
            <div class="input-group">
                <label for="modif-date">Date *</label>
                <div class="input-wrapper"><input type="date" id="modif-date"></div>
            </div>
            <div class="input-group">
                <label for="modif-heure">Heure *</label>
                <div class="input-wrapper"><input type="time" id="modif-heure"></div>
            </div>
        </div>
        <div class="input-group">
            <label for="modif-adresse">Adresse de livraison *</label>
            <div class="input-wrapper"><input type="text" id="modif-adresse" placeholder="Numéro et nom de rue"></div>
        </div>
        <div class="form-row">
            <div class="input-group">
                <label for="modif-ville">Ville *</label>
                <div class="input-wrapper"><input type="text" id="modif-ville"></div>
            </div>
            <div class="input-group">
                <label for="modif-cp">Code postal *</label>
                <div class="input-wrapper"><input type="text" id="modif-cp"></div>
            </div>
        </div>
        <div class="input-group">
            <label for="modif-personnes">Nombre de personnes *</label>
            <div class="input-wrapper"><input type="number" id="modif-personnes" min="1"></div>
        </div>
        <div class="form-msg" id="modif-msg" role="alert"></div>
        <div class="modal-buttons">
            <button id="btn-save-modifier-commande">💾 Enregistrer</button>
            <button onclick="document.getElementById('modal-modifier-commande').style.display='none'">Annuler</button>
        </div>
    </div>
</div>
</div>
