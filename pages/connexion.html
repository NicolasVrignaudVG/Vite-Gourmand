<!-- Structure complète pour l'affichage dans le routeur -->
<div class="connexion-page">
    <!-- Fond image -->
    <div class="connexion-bg">
        <img src="images/pexels-olaseni-omoare-2148436008-30322395.jpg"
             alt="Restaurant Vite&amp;Gourmand">
    </div>

    <!-- Carte de connexion -->
    <div class="login-card">
        <div class="card-header">
            <img src="images/LOGO.png" alt="Logo Vite&amp;Gourmand">
            <h1>Vite&amp;Gourmand</h1>
            <p>Connectez-vous à votre espace personnel</p>
        </div>

        <div class="form-msg" id="formMsg" role="alert"></div>

        <form class="login-form" id="loginForm" novalidate>
            <div class="input-group">
                <label for="email">Adresse e-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email"
                           placeholder="exemple@email.com" required
                           autocomplete="email">
                    <span class="input-icon" aria-hidden="true">📧</span>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required minlength="8"
                           autocomplete="current-password">
                    <span class="input-icon toggle password-toggle"
                          role="button"
                          tabindex="0"
                          aria-label="Afficher / masquer le mot de passe">👁️</span>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    Se souvenir de moi
                </label>
                <a href="#" class="forgot-password">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="login-btn">Se connecter</button>

            <div class="security-badge">
                <span aria-hidden="true">🔒</span> Connexion sécurisée SSL
            </div>

            <div class="divider">ou</div>

            <div class="signup-link">
                Vous n'avez pas encore de compte ?
                <a href="#inscription">Créer un compte</a>
            </div>
        </form>
    </div>
</div>
