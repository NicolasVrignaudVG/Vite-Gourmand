<div class="menus-container">

    <div class="main-title">
        <h1>NOS MENUS</h1>
        <div class="decoration"></div>
    </div>

    <div class="filters-bar">
        <div class="filters-grid">
            <div class="filter-group">
                <label for="filter-prix-max">Prix maximum</label>
                <div class="range-wrapper">
                    <input type="range" id="filter-prix-max" min="0" max="100" value="100" step="5">
                    <span class="range-value" id="prix-max-label">100€</span>
                </div>
            </div>
            <div class="filter-group">
                <label for="filter-prix-min">Fourchette de prix</label>
                <div class="price-range-inputs">
                    <input type="number" id="filter-prix-min" placeholder="Min €" min="0" max="200" value="">
                    <span>—</span>
                    <input type="number" id="filter-prix-max2" placeholder="Max €" aria-label="Prix maximum" min="0" max="200" value="">
                </div>
            </div>
            <div class="filter-group">
                <label for="filter-theme">Thème</label>
                <select id="filter-theme">
                    <option value="">Tous les thèmes</option>
                    <option value="classique">Classique</option>
                    <option value="noël">Noël</option>
                    <option value="pâques">Pâques</option>
                    <option value="événement">Événement</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-regime">Régime</label>
                <select id="filter-regime">
                    <option value="">Tous les régimes</option>
                    <option value="classique">Classique</option>
                    <option value="végétarien">Végétarien</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-personnes">Nb personnes min. max</label>
                <input type="number" id="filter-personnes" placeholder="Ex : 2" min="1" max="50" value="">
            </div>
        </div>
        <div class="filters-actions">
            <button class="btn-reset-filters" id="btn-reset-filters">✕ Réinitialiser</button>
            <span class="filters-count" id="filters-count">3 menus affichés</span>
        </div>
    </div>

    <!-- Grille remplie dynamiquement par script.js / initMenuDetails() -->
    <div class="menus-grid" id="menus-grid">
        <p style="text-align:center;padding:2rem;color:var(--color-text-muted)">Chargement des menus…</p>
    </div>

    <div class="no-results" id="no-results" style="display:none;">
        <p>😕 Aucun menu ne correspond à vos critères.</p>
        <button class="btn-reset-filters" id="btn-reset-filters2">Réinitialiser les filtres</button>
    </div>

    <div class="drinks-section">
        <h2 class="drinks-title">NOS BOISSONS</h2>
        <div class="drinks-grid">
            <div class="drink-category">
                <h3>SOFTS</h3>
                <ul><li>Coca-cola</li><li>Jus d'orange pressé</li><li>Eau minérale</li></ul>
            </div>
            <div class="drink-category">
                <h3>VINS</h3>
                <ul><li>Verre de vin rouge/blanc</li><li>Bouteille sélection du sommelier</li></ul>
            </div>
            <div class="drink-category">
                <h3>CHAUDES</h3>
                <ul><li>Café</li><li>Thé</li><li>Chocolat chaud</li></ul>
            </div>
        </div>
    </div>

</div>
